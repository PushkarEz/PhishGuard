<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>PhishGuard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  /* ── EXACT WEBSITE VARIABLES ── */
  :root {
    --bg1: #e6f7f5;
    --bg2: #d1f0ea;
    --glass: rgba(255,255,255,0.65);
    --glass-b: rgba(255,255,255,0.92);
    --tx: #0d1f1c;
    --txm: #374151;
    --txh: #9ca3af;
    --ac: #0d9488;
    --ac2: #34d399;
    --inp: rgba(255,255,255,0.92);
    --inp-b: rgba(13,148,136,0.28);
    --tag: rgba(255,255,255,0.80);
    --tag-b: rgba(0,0,0,0.09);
    --sh: 0 4px 24px rgba(13,148,136,0.12);
    --red: #dc2626;
    --red-bg: rgba(220,38,38,0.07);
    --red-b: rgba(220,38,38,0.3);
    --orange: #d97706;
    --orange-bg: rgba(217,119,6,0.07);
    --orange-b: rgba(217,119,6,0.3);
    --green-bg: rgba(13,148,136,0.07);
    --green-b: rgba(13,148,136,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 420px;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--tx);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
  }

  /* ── HEADER ── */
  .header {
    background: var(--glass-b);
    border-bottom: 1px solid var(--inp-b);
    padding: 13px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(20px);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
  }
  /* Exact website SVG logo */
  .logo-icon {
    width: 32px; height: 32px;
    flex-shrink: 0;
  }
  .logo-name {
    font-size: 17px;
    font-weight: 900;
    color: var(--tx);
    letter-spacing: -0.5px;
  }
  .logo-name b { color: var(--ac); }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    color: var(--ac);
    background: rgba(13,148,136,0.10);
    border: 1px solid rgba(13,148,136,0.25);
    padding: 3px 9px;
    border-radius: 20px;
  }
  .sdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
  }
  .sdot.on { animation: sdot 2.5s ease infinite; }
  .sdot.scanning { background: var(--ac); animation: pulse-s 0.8s infinite; }
  .sdot.off { background: var(--txh); animation: none; }
  @keyframes sdot { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 50%{box-shadow:0 0 0 4px rgba(34,197,94,0)} }
  @keyframes pulse-s { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.5)} }

  /* ── URL CARD ── */
  .url-card {
    margin: 12px 14px 0;
    background: var(--inp);
    border: 1px solid var(--inp-b);
    border-radius: 12px;
    padding: 10px 14px;
  }
  .url-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--ac);
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .url-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--txm);
    word-break: break-all;
    line-height: 1.5;
  }

  /* ── STATUS ROW ── */
  .status-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 14px 0;
    font-size: 11px;
    color: var(--txh);
    font-family: 'JetBrains Mono', monospace;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--txh);
    flex-shrink: 0;
  }
  .status-dot.scanning { background: var(--ac); animation: pulse-s 0.8s infinite; }
  .status-dot.safe     { background: #22c55e; }
  .status-dot.danger   { background: var(--red); }
  .status-dot.warn     { background: var(--orange); }

  /* ── MAIN SECTION ── */
  .main { padding: 12px 14px 14px; }

  /* ── SCANNING CARD ── */
  .scan-card {
    display: none;
    background: var(--glass);
    border: 1px solid var(--glass-b);
    border-radius: 14px;
    padding: 22px 18px;
    text-align: center;
    backdrop-filter: blur(20px);
    box-shadow: var(--sh);
  }
  .scan-card.show { display: block; }

  .scan-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--inp-b);
    border-top-color: var(--ac);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .scan-title { font-size: 15px; font-weight: 800; color: var(--tx); margin-bottom: 4px; }
  .scan-sub   { font-size: 11px; color: var(--txh); font-family: 'JetBrains Mono', monospace; }

  .scan-pills {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 14px;
  }
  .spill {
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--tag);
    border: 1px solid var(--tag-b);
    color: var(--txh);
    font-weight: 600;
  }
  .spill.active {
    background: rgba(13,148,136,0.10);
    border-color: rgba(13,148,136,0.28);
    color: var(--ac);
  }

  /* ── RESULT CARD ── */
  .res-card {
    display: none;
    background: var(--glass);
    border: 1px solid var(--glass-b);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--sh);
    backdrop-filter: blur(20px);
  }
  .res-card.show { display: block; }
  .res-card.red    { border-color: var(--red-b); }
  .res-card.orange { border-color: var(--orange-b); }
  .res-card.green  { border-color: var(--green-b); }

  /* Hero strip */
  .res-hero {
    padding: 16px 16px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .res-hero.red    { background: var(--red-bg); }
  .res-hero.orange { background: var(--orange-bg); }
  .res-hero.green  { background: var(--green-bg); }

  .res-icon { font-size: 34px; line-height: 1; flex-shrink: 0; margin-top: 2px; }

  .res-verdict {
    font-size: 20px;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .res-verdict.red    { color: var(--red); }
  .res-verdict.orange { color: var(--orange); }
  .res-verdict.green  { color: var(--ac); }

  .res-action {
    font-size: 12px;
    line-height: 1.5;
    color: var(--txm);
    white-space: pre-line;
  }

  /* Body */
  .res-body {
    padding: 12px 14px;
    border-top: 1px solid rgba(13,148,136,0.10);
  }

  /* Stat pills */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }
  .stat-box {
    background: var(--inp);
    border: 1px solid var(--inp-b);
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
  }
  .stat-val {
    font-size: 18px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-val.red    { color: var(--red); }
  .stat-val.orange { color: var(--orange); }
  .stat-val.green  { color: var(--ac); }
  .stat-val.muted  { color: var(--txh); }
  .stat-lbl {
    font-size: 8px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--txh);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* AI block */
  .ai-box {
    background: rgba(13,148,136,0.06);
    border: 1px solid rgba(13,148,136,0.18);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .ai-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--ac);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .ai-text {
    font-size: 11px;
    color: var(--txm);
    line-height: 1.6;
    font-style: italic;
  }

  /* ── BUTTONS ── */
  .scan-btn {
    width: 100%;
    padding: 12px;
    background: var(--ac);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    display: none;
    box-shadow: 0 4px 16px rgba(13,148,136,0.28);
    transition: all 0.2s;
  }
  .scan-btn:hover { background: #0a7a70; transform: translateY(-1px); }
  .scan-btn.show  { display: block; }

  .rescan-btn {
    width: 100%;
    margin-top: 8px;
    padding: 9px;
    background: transparent;
    color: var(--txh);
    border: 1px solid var(--tag-b);
    border-radius: 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    display: none;
    transition: all 0.2s;
  }
  .rescan-btn:hover { color: var(--ac); border-color: var(--inp-b); }
  .rescan-btn.show  { display: block; }

  /* ── FOOTER ── */
  .footer {
    background: var(--glass-b);
    border-top: 1px solid var(--inp-b);
    padding: 9px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-l {
    font-size: 9px;
    color: var(--txh);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }
  .dash-link {
    font-size: 11px;
    color: var(--ac);
    text-decoration: none;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 3px;
    transition: opacity 0.2s;
  }
  .dash-link:hover { opacity: 0.7; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <!-- Exact same SVG as website favicon -->
    <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="20" fill="#0d9488"/>
      <path d="M50 12 L82 26 L82 52 C82 70 66 82 50 88 C34 82 18 70 18 52 L18 26 Z" fill="white" opacity="0.92"/>
      <path d="M50 30 C50 30 62 34 62 46 C62 52 58 56 52 57 C52 57 54 64 58 68" stroke="#0d9488" stroke-width="5" stroke-linecap="round" fill="none"/>
      <path d="M55 65 C55 65 60 62 58 68 C56 74 50 72 50 72" stroke="#0d9488" stroke-width="4" stroke-linecap="round" fill="none"/>
      <circle cx="50" cy="44" r="4" fill="#0d9488"/>
    </svg>
    <div class="logo-name">Phish<b>Guard</b></div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="sdot on" id="live-dot"></div>
      <span id="live-label">AUTO-SCAN</span>
    </div>
  </div>
</div>

<!-- URL -->
<div class="url-card">
  <div class="url-label">Current Page</div>
  <div class="url-text" id="url-display">Detecting...</div>
</div>

<!-- STATUS ROW -->
<div class="status-row">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Checking scan status...</span>
</div>

<!-- MAIN -->
<div class="main">

  <!-- Scanning -->
  <div class="scan-card" id="scan-card">
    <div class="scan-spinner"></div>
    <div class="scan-title">Scanning with VirusTotal</div>
    <div class="scan-sub">Checking 70+ security engines · ~25s</div>
    <div class="scan-pills">
      <div class="spill active">Submit URL</div>
      <div class="spill active">Run Engines</div>
      <div class="spill" id="pill-verdict">Get Verdict</div>
    </div>
  </div>

  <!-- Result -->
  <div class="res-card" id="res-card">
    <div class="res-hero" id="res-hero">
      <div class="res-icon" id="res-icon"></div>
      <div>
        <div class="res-verdict" id="res-verdict"></div>
        <div class="res-action" id="res-action"></div>
      </div>
    </div>
    <div class="res-body">
      <div class="stat-row" id="stat-row"></div>
      <div class="ai-box" id="ai-box">
        <div class="ai-lbl">🤖 AI Analysis</div>
        <div class="ai-text" id="ai-text"></div>
      </div>
    </div>
  </div>

  <!-- Manual scan -->
  <button class="scan-btn" id="scan-btn">🔍 Scan This URL</button>
  <button class="rescan-btn" id="rescan-btn">↻ Re-scan</button>

</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-l">ByteX · VirusTotal · Auto-Protect ON</div>
  <a class="dash-link" href="http://localhost:5000" target="_blank">Full Dashboard ↗</a>
</div>

<script src="popup.js"></script>
</body>
</html>
